spring:
  application:
    name: oncare24
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ===========================
# JWT
# ===========================
jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-change-this-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-validity-in-seconds: 1800       # 30분
  refresh-token-validity-in-seconds: 1209600   # 14일

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
  default-produces-media-type: application/json

# ===========================
# Kakao Local API
# ===========================
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}
  base-url: https://dapi.kakao.com
  timeout-seconds: 5

# ===========================
# FCM (Firebase Cloud Messaging)
# ===========================
fcm:
  enabled: ${FCM_ENABLED:true}
  credentials-path: ${FCM_CREDENTIALS_PATH:./firebase/service-account.json}
  project-id: ${FCM_PROJECT_ID:bosalphim}

# ===========================
# SMS (SOLAPI)
# ===========================
sms:
  enabled: ${SMS_ENABLED:false}
  api-key: ${SMS_API_KEY:}
  api-secret: ${SMS_API_SECRET:}
  from: ${SMS_FROM:}
  base-url: https://api.solapi.com

# ===========================
# Security
# ===========================
oncare:
  security:
    crypto:
      enabled: ${ONCARE_SECURITY_CRYPTO_ENABLED:false}

# ===========================
# Graph RAG (복약 안전 분석 - 이정현 NestJS 서버)
# ===========================
graphrag:
  base-url: ${GRAPHRAG_BASE_URL:http://localhost:3000}
  timeout-seconds: 120
  enabled: ${GRAPHRAG_ENABLED:true}