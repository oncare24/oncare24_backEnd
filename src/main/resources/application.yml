spring:
  application:
    name: oncare24
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ===========================
# JWT
# ===========================
jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-change-this-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-validity-in-seconds: 1800       # 30분
  refresh-token-validity-in-seconds: 1209600   # 14일

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
  default-produces-media-type: application/json

# ===========================
# OpenAI
# ===========================
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini
  timeout-seconds: 15
  enabled: ${OPENAI_ENABLED:true}

# ===========================
# 국립중앙의료원
# ===========================
nmc:
  service-key: ${NMC_SERVICE_KEY:}
  hospital-base-url: http://apis.data.go.kr/B552657/HsptlAsembySearchService
  emergency-base-url: http://apis.data.go.kr/B552657/ErmctInfoInqireService
  timeout-seconds: 5
  mock: ${NMC_MOCK:true}

# ===========================
# TMAP
# ===========================
tmap:
  app-key: ${TMAP_APP_KEY:}
  pedestrian-url: https://apis.openapi.sk.com/tmap/routes/pedestrian
  transit-url: https://apis.openapi.sk.com/transit/routes
  timeout-seconds: 5
  mock: ${TMAP_MOCK:true}

# ===========================
# ODsay
# ===========================
odsay:
  api-key: ${ODSAY_API_KEY}
  base-url: https://api.odsay.com/v1/api
  mock: ${ODSAY_MOCK:false}